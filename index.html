<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Prabhjot and Luz">
    <meta name="description" content="Fast typing game">
    <meta name="keywords" content="game, typing, fast, scores, speed, fun">
    <link rel="icon" href="./media/favicon.png" type="image/png">
    <link rel="stylesheet" href="./styles/reset.css" media="all">
    <link rel="stylesheet" href="./styles/style.css" media="all">
    <script src="./scripts/script.js" defer type="module"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"rel="stylesheet">
    <title>Speed It Up!</title>
  </head>
  <body>
    <div class="container">
      <main>
        <div class="logo">
          <img src="./media/game-logo.png" alt="Speed it Up! game logo" />
        </div>
        <section id="game-box">
          <div id="game-status">Start Playing!</div>
          <div id="timer">
            <p>You have <span id="time-remaining">99</span> seconds!</p>
          </div>
          <div id="hits">
            <p>Hits: <span id="hits-count">0</span></p>
          </div>
          <div id="current-word"></div>
          <input id="word-input" type="text" autocomplete="off" disabled />
          <button id="start-btn">Start</button>
        </section>
        <div id="game-over-overlay" class="hidden">
          <div id="game-over-box">
            <h2>Game Over!</h2>
            <table id="score-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Hits</th>
                  <th>Percentage</th>
                </tr>
              </thead>
              <tbody id="score-body">
              </tbody>
            </table>
            <button id="play-again-btn">Play Again</button>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
